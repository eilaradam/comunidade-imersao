<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Admin · Comunidade Imersão</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/comunidade.css?v=20">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        background: #FAFAFC; color: #1D1D1F; -webkit-font-smoothing: antialiased;
        padding: 28px; max-width: 1000px; margin: 0 auto;
    }
    a { color: #1D1D1F; }
    .topo { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .topo h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
    .topo .volta { font-size: 14px; color: rgba(0,0,0,0.55); text-decoration: none; }
    .topo .volta:hover { color: #1D1D1F; }

    .abas { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .aba {
        font-family: inherit; font-size: 14px; font-weight: 600; color: rgba(0,0,0,0.55);
        background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.08); border-radius: 999px;
        padding: 9px 18px; cursor: pointer; transition: all 150ms ease;
    }
    .aba:hover { background: #fff; }
    .aba.on { background: #1D1D1F; color: #fff; border-color: transparent; }

    .barra { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .barra h2 { font-size: 18px; font-weight: 600; }
    .btn {
        font-family: inherit; font-size: 14px; font-weight: 600; color: #fff; background: #1D1D1F;
        border: none; border-radius: 100px; padding: 10px 20px; cursor: pointer; transition: background 150ms ease;
    }
    .btn:hover { background: #000; }
    .btn.ghost { background: rgba(0,0,0,0.06); color: #1D1D1F; }
    .btn.ghost:hover { background: rgba(0,0,0,0.1); }
    .btn.mini { font-size: 13px; padding: 7px 14px; }
    .btn.perigo { background: rgba(200,68,26,0.1); color: rgba(200,68,26,0.95); }
    .btn.perigo:hover { background: rgba(200,68,26,0.18); }

    .card {
        background: #fff; border: 1px solid rgba(0,0,0,0.07); border-radius: 16px;
        padding: 16px 18px; margin-bottom: 12px;
    }
    .item { display: flex; align-items: center; gap: 14px; }
    .item .info { flex: 1; min-width: 0; }
    .item .info b { font-size: 15px; font-weight: 600; display: block; }
    .item .info span { font-size: 13px; color: rgba(0,0,0,0.5); }
    .tag-pub { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
    .tag-pub.sim { background: rgba(28,124,84,0.12); color: #1c7c54; }
    .tag-pub.nao { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.5); }
    .acoes-item { display: flex; gap: 8px; }
    .btn-cor { font-size: 16px; line-height: 1; background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.08); border-radius: 100px; width: 34px; height: 30px; cursor: pointer; display: grid; place-items: center; padding: 0; transition: transform 120ms ease, background 150ms ease; filter: grayscale(1); opacity: .7; }
    .btn-cor:hover { background: rgba(0,0,0,0.09); }
    .btn-cor.on { filter: none; opacity: 1; background: rgba(200,68,26,0.08); border-color: rgba(200,68,26,0.2); }
    .btn-cor:active { transform: scale(0.9); }

    .form-card { background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 18px; padding: 22px; margin-bottom: 20px; display: none; }
    .form-card.aberto { display: block; }
    .form-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .campo { margin-bottom: 14px; }
    .campo label { display: block; font-size: 13px; font-weight: 500; color: rgba(0,0,0,0.6); margin-bottom: 6px; }
    .campo input[type=text], .campo input[type=number], .campo textarea, .campo select {
        width: 100%; font-family: inherit; font-size: 14px; color: #1D1D1F;
        background: #fff; border: 1px solid rgba(0,0,0,0.15); border-radius: 10px; padding: 10px 12px; outline: none;
    }
    .campo input:focus, .campo textarea:focus, .campo select:focus { border-color: #1D1D1F; }
    .campo textarea { resize: vertical; min-height: 80px; }
    .campo.check { display: flex; align-items: center; gap: 8px; }
    .campo.check input { width: 18px; height: 18px; }
    .campo.check label { margin: 0; }
    .form-acoes { display: flex; gap: 10px; margin-top: 6px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }

    .recado { font-size: 14px; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; display: none; }
    .recado.show { display: block; }
    .recado.erro { background: rgba(200,68,26,0.1); color: rgba(200,68,26,0.95); }
    .recado.ok { background: rgba(28,124,84,0.1); color: #1c7c54; }
    .vazio { color: rgba(0,0,0,0.45); font-size: 14px; padding: 20px 0; }
    #bloqueio { text-align: center; padding: 80px 20px; }
    #bloqueio h2 { font-size: 20px; margin-bottom: 8px; }
    #bloqueio p { color: rgba(0,0,0,0.55); }

    /* ── Campo de imagem (upload) ── */
    .img-erro { display: none; font-size: 13px; color: rgba(200,68,26,0.9); margin-top: 6px; }
    .img-erro.show { display: block; }
    .img-preview { display: none; align-items: center; gap: 14px; margin-top: 10px; }
    .img-preview.show { display: flex; }
    .img-box { width: 200px; height: 120px; border-radius: 12px; overflow: hidden; flex-shrink: 0; background: rgba(0,0,0,0.05); }
    .img-box img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .rm-img { background: none; border: none; font-family: inherit; font-size: 13px; color: rgba(200,68,26,0.9); cursor: pointer; padding: 0; }
    .rm-img:hover { text-decoration: underline; }

    /* ── Preview dos cards (igual à comunidade) ── */
    .admin-lista { padding: 22px; border-radius: 20px; background: linear-gradient(140deg, #ECE9F4, #F4EEF0 55%, #EAF1EE); }
    .admin-lista.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-items: start; }
    .admin-lista.lista { display: flex; flex-direction: column; gap: 14px; }
    .admin-card { display: flex; flex-direction: column; gap: 10px; }
    .admin-barra { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .admin-barra .nome { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.45); text-transform: uppercase; letter-spacing: .04em; }
    .admin-barra .dir { display: flex; gap: 6px; }
    .admin-prev { display: flex; }
    .admin-prev > * { width: 100%; }
    /* carrossel vira card estático dentro do admin */
    .admin-lista .c-card { position: static; margin: 0; width: 100%; max-width: none; height: auto; transform: none !important; opacity: 1 !important; box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
</style>
</head>
<body>
    <div class="topo">
        <h1>Admin · Comunidade</h1>
        <a class="volta" href="app.html">← Voltar para a comunidade</a>
    </div>

    <div id="bloqueio" style="display:none">
        <h2>Acesso restrito</h2>
        <p>Essa área é só para administradoras.</p>
        <p id="dicaAdmin" style="margin-top:18px; font-size:13px; color:rgba(0,0,0,0.5); line-height:1.7; max-width:560px; margin-left:auto; margin-right:auto"></p>
    </div>

    <div id="painel" style="display:none">
        <div class="abas" id="abas"></div>
        <div class="recado" id="recado"></div>
        <div class="barra">
            <h2 id="tituloSecao"></h2>
            <button class="btn" id="btnNovo">+ Novo</button>
        </div>
        <div class="form-card" id="formCard"></div>
        <div id="lista"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/sb.js?v=14"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
    (function () {
        'use strict';
        const { sb, esc, quando } = window.C || {};

        const TONS = ['lavanda', 'menta', 'pessego', 'lavandaClara'];
        const TOMCSS = {
            lavanda: 'linear-gradient(135deg, #C8B8E0, #B8C6E8)',
            lavandaClara: 'linear-gradient(135deg, #D8CEEE, #CBD5F2)',
            menta: 'linear-gradient(135deg, #B8E0D0, #CBEBDE)',
            pessego: 'linear-gradient(135deg, #E8C4B8, #F1D8C6)'
        };
        const TOMLIST = [TOMCSS.pessego, TOMCSS.lavanda, TOMCSS.menta, TOMCSS.lavandaClara];
        const gtom = (k) => TOMCSS[k] || TOMCSS.pessego;

        const LAYOUTS = { prompts: 'grid', destaques: 'grid', store: 'grid', materiais: 'lista', avisos: 'lista' };
        const PREVIEWS = {
            prompts: r => `<div class="p-card">
                <div><span class="pill-cat">${esc(r.tema || '')}</span></div>
                <h3>${esc(r.titulo || '')}</h3>
                <div class="preview">${esc(r.descricao || r.prompt || '')}</div>
                <div class="p-rodape"><button class="btn-preto">Copiar prompt</button></div>
            </div>`,
            destaques: r => {
                const gratis = /gratu/i.test(r.preco || '');
                return `<div class="c-card">
                    <div class="c-thumb${r.imagem_url ? ' has-img' : ''}" style="background:${gtom(r.tom)}">
                        ${r.imagem_url ? `<img class="c-img" src="${esc(r.imagem_url)}" alt="" onerror="this.style.display='none'">` : ''}
                        ${r.off ? `<span class="off">${esc(r.off)} OFF</span>` : ''}
                        <span class="badge">${esc(r.categoria || '')}</span>
                    </div>
                    <div class="c-corpo">
                        <h3>${esc(r.titulo || '')}</h3>
                        <div class="local"><i data-lucide="user"></i> ${esc(r.subtitulo || '')}</div>
                        <div class="desc-label">Descrição</div>
                        <p class="desc-text">${esc(r.descricao || '')}</p>
                        <div class="c-rodape">
                            <div class="preco-bloco"><span class="preco-label">Valor</span>
                                <span class="preco-linha">${r.preco_antigo ? `<s class="antes">${esc(r.preco_antigo)}</s>` : ''}<span class="preco${gratis ? ' gratis' : ''}">${esc(r.preco || '')}</span></span>
                            </div>
                            <button class="acao"><i data-lucide="${gratis ? 'play' : 'arrow-right'}"></i></button>
                        </div>
                    </div>
                </div>`;
            },
            store: r => {
                const cor = { lavanda: 'linear-gradient(135deg, #C8B8E0, #B8C6E8)', menta: 'linear-gradient(135deg, #B8E0D0, #B8C6E8)', pessego: 'linear-gradient(135deg, #E8C4B8, #C8B8E0)' }[r.cor] || 'linear-gradient(135deg, #C8B8E0, #B8C6E8)';
                const preco = r.preco == null ? 0 : Number(r.preco);
                const fmt = (v) => 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: Number.isInteger(Number(v)) ? 0 : 2, maximumFractionDigits: 2 });
                const de = r.preco_de == null ? null : Number(r.preco_de);
                const precoHTML = !preco ? '<span class="gratis">Gratuito</span>'
                    : (de && de > preco ? `<s class="antes">${fmt(de)}</s><span class="agora">${fmt(preco)}</span>` : `<span class="agora">${fmt(preco)}</span>`);
                return `<div class="s-card">
                    <div class="s-thumb${r.imagem_url ? ' has-img' : ''}" style="background:${cor}">${r.imagem_url ? `<img class="s-img" src="${esc(r.imagem_url)}" alt="" onerror="this.style.display='none'">` : ''}${r.tag ? `<span class="badge">${esc(r.tag)}</span>` : ''}</div>
                    <div class="s-corpo"><h3>${esc(r.nome || '')}</h3><div class="desc">${esc(r.descricao || '')}</div>
                        <div class="s-rodape"><div class="s-preco">${precoHTML}</div><button class="s-comprar">${preco ? 'Comprar' : 'Acessar'} <span>→</span></button></div></div>
                </div>`;
            },
            materiais: (r, i) => `<div class="mat-item">
                <div class="mat-ico" style="background:${TOMLIST[i % 4]}"><i data-lucide="file-text"></i></div>
                <div class="mat-meio"><h3>${esc(r.titulo || '')}</h3><div class="tipo">${esc(r.descricao || '')}</div></div>
                <a class="btn-glass"><i data-lucide="download"></i> Baixar</a>
            </div>`,
            avisos: r => `<div class="aviso">
                <div class="data">${esc(quando ? quando(r.created_at) : '')}</div>
                <h3>${esc(r.titulo || '')}</h3>
                <div class="corpo">${esc(r.corpo || '')}</div>
            </div>`
        };

        const ENTIDADES = {
            prompts: {
                tabela: 'imersao_prompts', nome: 'Prompts', ordena: 'created_at', asc: false, coracao: true,
                titulo: r => r.titulo, sub: r => r.tema || '—',
                campos: [
                    { n: 'tema', l: 'Tema (badge do card)', t: 'text' },
                    { n: 'titulo', l: 'Título', t: 'text', req: true },
                    { n: 'descricao', l: 'Descrição curta (aparece no card)', t: 'textarea' },
                    { n: 'prompt', l: 'Prompt completo (texto que é copiado)', t: 'textarea', req: true },
                    { n: 'publicado', l: 'Publicado', t: 'bool', def: true }
                ]
            },
            destaques: {
                tabela: 'imersao_destaques', nome: 'Destaques', ordena: 'ordem', asc: true,
                titulo: r => r.titulo, sub: r => r.categoria || '—',
                campos: [
                    { n: 'titulo', l: 'Título', t: 'text', req: true },
                    { n: 'subtitulo', l: 'Subtítulo (autor/turma)', t: 'text' },
                    { n: 'categoria', l: 'Categoria (badge)', t: 'text' },
                    { n: 'imagem_url', l: 'Imagem do card', t: 'imagem' },
                    { n: 'descricao', l: 'Descrição', t: 'textarea' },
                    { n: 'preco', l: 'Preço (ex: R$ 197 ou Gratuita)', t: 'text' },
                    { n: 'preco_antigo', l: 'Preço antigo (riscado)', t: 'text' },
                    { n: 'off', l: 'Desconto (calculado automaticamente)', t: 'off' },
                    { n: 'link', l: 'Link do botão Acessar', t: 'text' },
                    { n: 'tom', l: 'Cor do card', t: 'tom' },
                    { n: 'ordem', l: 'Ordem', t: 'num' },
                    { n: 'na_store', l: 'Mostrar também na Store', t: 'bool' },
                    { n: 'publicado', l: 'Publicado', t: 'bool', def: true }
                ]
            },
            store: {
                tabela: 'produtos', nome: 'Store', ordena: 'ordem', asc: true, flag: 'ativo', coracao: true,
                titulo: r => r.nome, sub: r => (r.preco != null ? 'R$ ' + r.preco : '—'),
                campos: [
                    { n: 'nome', l: 'Nome', t: 'text', req: true },
                    { n: 'subtitulo', l: 'Autor/turma (opcional, aparece no card em destaque)', t: 'text' },
                    { n: 'descricao', l: 'Descrição', t: 'textarea' },
                    { n: 'preco', l: 'Preço (ex: 197 ou 47.90)', t: 'dec' },
                    { n: 'preco_de', l: 'Preço "de" (riscado, opcional)', t: 'dec' },
                    { n: 'checkout_url', l: 'Link de checkout (Kiwify)', t: 'text' },
                    { n: 'tag', l: 'Tag (badge, opcional)', t: 'text' },
                    { n: 'imagem_url', l: 'Imagem do card', t: 'imagem' },
                    { n: 'cor', l: 'Cor do card (fallback sem imagem)', t: 'select', opts: ['lavanda', 'menta', 'pessego'] },
                    { n: 'ordem', l: 'Ordem', t: 'num' },
                    { n: 'ativo', l: 'Ativo (aparece na Store)', t: 'bool', def: true }
                ]
            },
            materiais: {
                tabela: 'imersao_materiais', nome: 'Materiais', ordena: 'ordem', asc: true,
                titulo: r => r.titulo, sub: r => r.descricao || '—',
                campos: [
                    { n: 'titulo', l: 'Título', t: 'text', req: true },
                    { n: 'descricao', l: 'Descrição (ex: PDF · 2.3 MB)', t: 'text' },
                    { n: 'url', l: 'Link do arquivo', t: 'text' },
                    { n: 'ordem', l: 'Ordem', t: 'num' },
                    { n: 'publicado', l: 'Publicado', t: 'bool', def: true }
                ]
            },
            avisos: {
                tabela: 'imersao_avisos', nome: 'Avisos', ordena: 'created_at', asc: false, coracao: true,
                titulo: r => r.titulo, sub: r => (r.corpo || '').slice(0, 60),
                campos: [
                    { n: 'titulo', l: 'Título', t: 'text', req: true },
                    { n: 'corpo', l: 'Corpo', t: 'textarea', req: true },
                    { n: 'publicado', l: 'Publicado', t: 'bool', def: true }
                ]
            },
            admins: {
                tabela: 'imersao_admins', nome: 'Admins', ordena: 'created_at', asc: false, chave: 'email',
                titulo: r => r.email, sub: r => 'Administradora',
                campos: [
                    { n: 'email', l: 'E-mail do admin (o mesmo que ela usa pra logar na comunidade)', t: 'text', req: true }
                ]
            }
        };

        let atual = 'prompts';
        let editando = null;

        const el = (id) => document.getElementById(id);
        function recado(txt, tipo) {
            const r = el('recado');
            r.textContent = txt || '';
            r.className = 'recado' + (txt ? ' show ' + (tipo || 'erro') : '');
            if (txt && tipo === 'ok') setTimeout(() => { r.className = 'recado'; }, 3000);
        }

        function montarAbas() {
            el('abas').innerHTML = Object.keys(ENTIDADES).map(k =>
                `<button class="aba${k === atual ? ' on' : ''}" data-ent="${k}">${ENTIDADES[k].nome}</button>`).join('');
            el('abas').querySelectorAll('.aba').forEach(b => b.addEventListener('click', () => {
                atual = b.dataset.ent; editando = null; fecharForm();
                document.querySelectorAll('.aba').forEach(a => a.classList.toggle('on', a.dataset.ent === atual));
                el('tituloSecao').textContent = ENTIDADES[atual].nome;
                carregar();
            }));
        }

        async function carregar() {
            const cfg = ENTIDADES[atual];
            el('lista').className = '';
            el('lista').innerHTML = '<div class="vazio">Carregando…</div>';
            const { data, error } = await sb.from(cfg.tabela).select('*').order(cfg.ordena, { ascending: cfg.asc });
            if (error) { el('lista').className = ''; el('lista').innerHTML = '<div class="vazio">Erro ao carregar.</div>'; return; }
            // Na aba Store, também traz os Destaques marcados "Mostrar também na Store" (sem duplicar cadastro)
            let extras = [];
            if (atual === 'store') {
                try {
                    const r = await sb.from('imersao_destaques').select('*').eq('publicado', true).eq('na_store', true).order('ordem', { ascending: true });
                    if (r.data) extras = r.data;
                } catch (e) {}
            }
            if ((!data || !data.length) && !extras.length) { el('lista').className = ''; el('lista').innerHTML = '<div class="vazio">Nada aqui ainda. Clique em “+ Novo”.</div>'; return; }
            const chave = cfg.chave || 'id';
            const flagField = cfg.flag || (cfg.campos.some(c => c.n === 'publicado') ? 'publicado' : null);
            const prev = PREVIEWS[atual];
            const ferramentas = (r) => `<span class="dir">
                ${cfg.coracao ? `<button class="btn-cor${r.destaque ? ' on' : ''}" data-acao="coracao" data-k="${esc(String(r[chave]))}" title="${r.destaque ? 'Tirar do carrossel Em destaque' : 'Colocar no carrossel Em destaque'}" aria-label="Destacar">${r.destaque ? '❤️' : '🤍'}</button>` : ''}
                <button class="btn ghost mini" data-acao="editar" data-k="${esc(String(r[chave]))}">Editar</button>
                <button class="btn perigo mini" data-acao="apagar" data-k="${esc(String(r[chave]))}">Apagar</button>
            </span>`;
            // Card "emprestado" de Destaques (read-only aqui; edita na aba Destaques)
            const mapExtra = (r) => ({
                id: r.id, nome: r.titulo, descricao: r.descricao,
                preco: parsePreco(r.preco), preco_de: parsePreco(r.preco_antigo),
                tag: r.categoria, imagem_url: r.imagem_url,
                cor: ['lavanda', 'menta', 'pessego'].includes(r.tom) ? r.tom : 'lavanda'
            });
            const cardExtra = (r) => `
                <div class="admin-card">
                    <div class="admin-barra">
                        <span class="nome">↩ vem de Destaques</span>
                        <span class="dir"><button class="btn ghost mini" data-acao="ir-destaque" data-k="${esc(String(r.id))}">Editar em Destaques</button></span>
                    </div>
                    <div class="admin-prev">${PREVIEWS.store(mapExtra(r))}</div>
                </div>`;
            if (prev) {
                el('lista').className = 'admin-lista ' + (LAYOUTS[atual] || 'grid');
                el('lista').innerHTML = (data || []).map((r, i) => `
                    <div class="admin-card">
                        <div class="admin-barra">
                            <span class="nome">${flagField ? (r[flagField] ? '● no ar' : '○ oculto') : ''}${r.destaque ? ' · em destaque' : ''}</span>
                            ${ferramentas(r)}
                        </div>
                        <div class="admin-prev">${prev(r, i)}</div>
                    </div>`).join('') + extras.map(cardExtra).join('');
            } else {
                el('lista').className = '';
                el('lista').innerHTML = data.map(r => `
                    <div class="card"><div class="item">
                        <div class="info">
                            <b>${esc(String(cfg.titulo(r) || '(sem título)'))}</b>
                            <span>${esc(String(cfg.sub(r) || ''))}</span>
                        </div>
                        <div class="acoes-item">${ferramentas(r)}</div>
                    </div></div>`).join('');
            }
            el('lista').querySelectorAll('[data-acao="editar"]').forEach(b => b.addEventListener('click', () => {
                const r = data.find(x => String(x[chave]) === b.dataset.k);
                abrirForm(r);
            }));
            el('lista').querySelectorAll('[data-acao="apagar"]').forEach(b => b.addEventListener('click', () => apagar(b.dataset.k)));
            el('lista').querySelectorAll('[data-acao="coracao"]').forEach(b => b.addEventListener('click', () => {
                const r = data.find(x => String(x[chave]) === b.dataset.k);
                toggleDestaque(b.dataset.k, !r.destaque);
            }));
            el('lista').querySelectorAll('[data-acao="ir-destaque"]').forEach(b => b.addEventListener('click', () => {
                const r = extras.find(x => String(x.id) === b.dataset.k);
                atual = 'destaques';
                document.querySelectorAll('.aba').forEach(a => a.classList.toggle('on', a.dataset.ent === 'destaques'));
                el('tituloSecao').textContent = ENTIDADES.destaques.nome;
                carregar().then(() => { if (r) abrirForm(r); });
            }));
            if (window.lucide) lucide.createIcons();
        }

        async function toggleDestaque(id, novo) {
            const cfg = ENTIDADES[atual];
            const { error } = await sb.from(cfg.tabela).update({ destaque: novo }).eq(cfg.chave || 'id', id);
            if (error) {
                if (/column .*destaque.* does not exist/i.test(error.message || '')) {
                    recado('Falta a coluna "destaque" no banco. Rode o SQL de configuração primeiro.');
                } else { recado('Não consegui atualizar o destaque: ' + error.message); }
                return;
            }
            recado(novo ? 'Colocado no carrossel Em destaque ❤️' : 'Removido do carrossel.', 'ok');
            carregar();
        }

        function campoHTML(c, valor) {
            const v = valor == null ? '' : valor;
            if (c.t === 'imagem') {
                return `<div class="campo">
                    <label>${c.l}</label>
                    <input type="file" id="file_${c.n}" accept="image/jpeg,image/png,image/webp">
                    <div class="img-erro" id="erro_${c.n}"></div>
                    <div class="img-preview" id="prev_${c.n}">
                        <div class="img-box"><img id="img_${c.n}" src="${esc(String(v))}" alt=""></div>
                        <button type="button" class="rm-img" id="rm_${c.n}">Remover imagem</button>
                    </div>
                    <input type="hidden" id="f_${c.n}" value="${esc(String(v))}">
                </div>`;
            }
            if (c.t === 'off') {
                return `<div class="campo"><label for="f_${c.n}">${c.l}</label><input type="text" id="f_${c.n}" value="${esc(String(v))}" readonly placeholder="—" style="background:rgba(0,0,0,0.04); color:rgba(0,0,0,0.55); cursor:default"></div>`;
            }
            if (c.t === 'bool') {
                const marcado = valor == null ? !!c.def : !!valor;
                return `<div class="campo check"><input type="checkbox" id="f_${c.n}" ${marcado ? 'checked' : ''}><label for="f_${c.n}">${c.l}</label></div>`;
            }
            if (c.t === 'textarea') {
                return `<div class="campo"><label for="f_${c.n}">${c.l}</label><textarea id="f_${c.n}">${esc(String(v))}</textarea></div>`;
            }
            if (c.t === 'tom' || c.t === 'select') {
                const opts = c.t === 'tom' ? TONS : (c.opts || []);
                return `<div class="campo"><label for="f_${c.n}">${c.l}</label><select id="f_${c.n}">${['', ...opts].map(o => `<option value="${o}"${o === v ? ' selected' : ''}>${o || '(padrão)'}</option>`).join('')}</select></div>`;
            }
            const tipo = (c.t === 'num' || c.t === 'dec') ? 'number' : 'text';
            const step = c.t === 'dec' ? ' step="0.01"' : '';
            return `<div class="campo"><label for="f_${c.n}">${c.l}</label><input type="${tipo}"${step} id="f_${c.n}" value="${esc(String(v))}"></div>`;
        }

        function abrirForm(reg) {
            editando = reg || null;
            const cfg = ENTIDADES[atual];
            el('formCard').innerHTML =
                `<h3>${reg ? 'Editar' : 'Novo'} — ${cfg.nome}</h3>` +
                cfg.campos.map(c => campoHTML(c, reg ? reg[c.n] : null)).join('') +
                `<div class="form-acoes"><button class="btn" id="btnSalvar">Salvar</button><button class="btn ghost" id="btnCancelar">Cancelar</button></div>`;
            el('formCard').classList.add('aberto');
            el('btnSalvar').addEventListener('click', salvar);
            el('btnCancelar').addEventListener('click', fecharForm);
            cfg.campos.filter(c => c.t === 'imagem').forEach(wireImagem);
            if (cfg.campos.some(c => c.t === 'off')) wireDesconto();
            el('formCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function wireImagem(c) {
            const file = el('file_' + c.n), hid = el('f_' + c.n), prev = el('prev_' + c.n),
                  img = el('img_' + c.n), erro = el('erro_' + c.n), rm = el('rm_' + c.n);
            if (!file || !hid) return;
            const mostrar = (url) => {
                if (url) { img.src = url; prev.classList.add('show'); }
                else { img.src = ''; prev.classList.remove('show'); }
            };
            mostrar(hid.value);
            rm.addEventListener('click', () => { hid.value = ''; file.value = ''; erro.classList.remove('show'); mostrar(''); });
            file.addEventListener('change', async () => {
                const f = file.files[0]; if (!f) return;
                erro.classList.remove('show');
                if (f.size > 2 * 1024 * 1024) { erro.textContent = 'Imagem muito grande. Máximo 2MB.'; erro.classList.add('show'); file.value = ''; return; }
                const btn = el('btnSalvar');
                if (btn) { btn.disabled = true; btn.dataset.orig = btn.textContent; btn.textContent = 'Enviando...'; }
                try {
                    const ext = (f.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '');
                    const nome = crypto.randomUUID() + '.' + ext;
                    const up = await sb.storage.from('produtos').upload(nome, f, { cacheControl: '3600', upsert: false });
                    if (up.error) throw up.error;
                    const { data: { publicUrl } } = sb.storage.from('produtos').getPublicUrl(nome);
                    hid.value = publicUrl; mostrar(publicUrl);
                } catch (e) {
                    console.error('Erro no upload:', e);
                    const msg = (e && (e.message || e.error || e.statusCode)) ? String(e.message || e.error || e.statusCode) : '';
                    let amiga = 'Não consegui enviar a imagem. Tente de novo.';
                    if (/bucket not found/i.test(msg)) amiga = 'O bucket "produtos" não existe no Supabase. Rode o SQL de configuração primeiro.';
                    else if (/row-level security|violates|not authorized|permission|policy/i.test(msg)) amiga = 'Sem permissão pra subir no bucket. Falta a policy de upload (rode o SQL).';
                    else if (msg) amiga = 'Não consegui enviar: ' + msg;
                    erro.textContent = amiga; erro.classList.add('show');
                } finally {
                    if (btn) { btn.disabled = false; btn.textContent = btn.dataset.orig || 'Salvar'; }
                }
            });
        }
        function parsePreco(s) {
            if (s == null) return null;
            let t = String(s).replace(/[R$\s]/gi, '').trim();
            if (!t) return null;
            if (t.includes(',')) t = t.replace(/\./g, '').replace(',', '.');
            else if (/\.\d{3}(\.|$)/.test(t)) t = t.replace(/\./g, '');
            const n = parseFloat(t);
            return isNaN(n) ? null : n;
        }
        function wireDesconto() {
            const fp = el('f_preco'), fpa = el('f_preco_antigo'), foff = el('f_off');
            if (!fp || !fpa || !foff) return;
            const calc = () => {
                const p = parsePreco(fp.value), pa = parsePreco(fpa.value);
                foff.value = (p != null && pa != null && pa > p && pa > 0) ? Math.round((pa - p) / pa * 100) + '%' : '';
            };
            fp.addEventListener('input', calc);
            fpa.addEventListener('input', calc);
            calc();
        }

        function fecharForm() { el('formCard').classList.remove('aberto'); el('formCard').innerHTML = ''; editando = null; }

        async function salvar() {
            const cfg = ENTIDADES[atual];
            const payload = {};
            for (const c of cfg.campos) {
                const campo = el('f_' + c.n);
                if (c.t === 'bool') payload[c.n] = campo.checked;
                else if (c.t === 'num') payload[c.n] = campo.value === '' ? 0 : parseInt(campo.value, 10) || 0;
                else if (c.t === 'dec') payload[c.n] = campo.value.trim() === '' ? null : (parseFloat(campo.value) || 0);
                else payload[c.n] = campo.value.trim() === '' ? null : campo.value.trim();
                if (c.req && (payload[c.n] === null || payload[c.n] === '')) { recado('Preencha: ' + c.l); return; }
            }
            const btn = el('btnSalvar'); btn.disabled = true; btn.textContent = 'Salvando…';
            const chave = cfg.chave || 'id';
            let res;
            if (editando) res = await sb.from(cfg.tabela).update(payload).eq(chave, editando[chave]);
            else res = await sb.from(cfg.tabela).insert(payload);
            btn.disabled = false; btn.textContent = 'Salvar';
            if (res.error) { recado('Não consegui salvar: ' + res.error.message); return; }
            recado('Salvo!', 'ok'); fecharForm(); carregar();
        }

        async function apagar(val) {
            if (!confirm('Apagar de verdade? Isso não volta.')) return;
            const cfg = ENTIDADES[atual];
            const { error } = await sb.from(cfg.tabela).delete().eq(cfg.chave || 'id', val);
            if (error) { recado('Não consegui apagar: ' + error.message); return; }
            recado('Apagado.', 'ok'); carregar();
        }

        el('btnNovo').addEventListener('click', () => abrirForm(null));

        /* ── Entrada: precisa estar logada E ser admin ── */
        (async function () {
            if (!sb) return;
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.replace('index.html'); return; }
            const { data: adm } = await sb.rpc('is_admin');
            if (!adm) {
                const email = (session.user && session.user.email) || '';
                const dica = el('dicaAdmin');
                if (dica && email) {
                    dica.innerHTML = 'Você está logada como <b>' + esc(email) + '</b>.<br><br>' +
                        'Para virar admin, rode isto no SQL Editor do Supabase:<br>' +
                        '<code style="user-select:all; display:inline-block; margin-top:8px; background:rgba(0,0,0,0.05); padding:8px 12px; border-radius:8px">' +
                        "insert into imersao_admins (email) values ('" + esc(email) + "') on conflict do nothing;</code>";
                }
                el('bloqueio').style.display = 'block';
                return;
            }
            el('painel').style.display = 'block';
            el('tituloSecao').textContent = ENTIDADES[atual].nome;
            montarAbas();
            carregar();
        })();
    })();
    </script>
</body>
