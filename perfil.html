<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Meu perfil · Comunidade Imersão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/comunidade.css?v=27">
</head>
<body data-pagina="perfil">
    <!-- Fundo idêntico ao login: blobs + starburst, fixos -->
    <div class="blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
        <div class="blob b4"></div>
    </div>
    <div id="cena"></div>

    <!-- Menu lateral compacto (esconde no scroll → vira FAB) -->
    <nav class="menu" id="mainMenu">
        <a href="app.html#inicio"    data-tip="Início"><i data-lucide="home"></i></a>
        <a href="mural.html"         data-tip="Mural dos alunos"><i data-lucide="layout-grid"></i></a>
        <a href="app.html#prompts"   data-tip="Prompts"><i data-lucide="sparkles"></i></a>
        <a href="app.html#materiais" data-tip="Materiais"><i data-lucide="folder"></i></a>
        <a href="app.html#avisos"    data-tip="Avisos" class="so-desktop"><i data-lucide="bell"></i></a>
        <a href="loja.html"          data-tip="Store" class="so-desktop"><i data-lucide="shopping-bag"></i></a>
        <span class="sep-menu"></span>
        <a href="perfil.html"        data-tip="Meu perfil" class="ativo"><i data-lucide="user"></i></a>
    </nav>

    <!-- FAB (aparece após rolar) -->
    <button class="fab" id="fab" aria-label="Abrir menu"><i data-lucide="menu"></i></button>

    <!-- Popup do FAB -->
    <div class="fab-menu" id="fabMenu">
        <a href="app.html#inicio"><i data-lucide="home"></i><span>Início</span></a>
        <a href="mural.html"><i data-lucide="layout-grid"></i><span>Mural dos alunos</span></a>
        <a href="app.html#prompts"><i data-lucide="sparkles"></i><span>Prompts</span></a>
        <a href="app.html#materiais"><i data-lucide="folder"></i><span>Materiais</span></a>
        <a href="app.html#avisos"><i data-lucide="bell"></i><span>Avisos</span></a>
        <a href="loja.html"><i data-lucide="shopping-bag"></i><span>Store</span></a>
        <span class="sep-pop"></span>
        <a href="perfil.html" class="ativo"><i data-lucide="user"></i><span>Meu perfil</span></a>
    </div>

    <div class="lane">
        <div class="conteudo">
            <div class="mural-header" style="padding-top:80px">
                <h1>Meu perfil</h1>
                <p>Sua conta, compras e publicações</p>
            </div>

            <section id="perfil">
                <div class="perfil-box">
                    <label class="avatar-wrap" for="fotoInput" title="Trocar foto de perfil">
                        <div class="avatar" id="avatar">L</div>
                        <span class="avatar-cam"><i data-lucide="camera"></i></span>
                    </label>
                    <input type="file" id="fotoInput" accept="image/*" hidden>
                    <div class="foto-status" id="fotoStatus"></div>
                    <div class="nome"><span id="perfilNome">Lara Dam</span><span class="verificado" title="Membro da comunidade"><i data-lucide="badge-check"></i></span></div>
                    <div class="email" id="perfilEmail">lara@claudeimersao.com</div>
                    <div class="bio-editor">
                        <textarea id="bioInput" maxlength="160" placeholder="Escreva uma bio curta — aparece quando alguém abre seu perfil no mural 💜"></textarea>
                        <div class="bio-linha">
                            <button class="btn-preto bio-btn" id="salvarBio">Salvar bio</button>
                            <span class="bio-status" id="bioStatus"></span>
                        </div>
                    </div>
                    <div class="perfil-lista">
                        <button class="perfil-op" id="btnDados"><span class="ico"><i data-lucide="user"></i></span> Dados da conta <span class="chev"><i data-lucide="chevron-right"></i></span></button>
                        <div class="perfil-dados" id="painelDados" style="display:none"></div>
                        <button class="perfil-op em-breve"><span class="ico"><i data-lucide="receipt"></i></span> Minhas compras <span class="chev"><i data-lucide="chevron-right"></i></span></button>
                        <button class="perfil-op em-breve"><span class="ico"><i data-lucide="bell"></i></span> Preferências de notificação <span class="chev"><i data-lucide="chevron-right"></i></span></button>
                        <a class="perfil-op" href="mailto:laradam.ugc@gmail.com?subject=Suporte%20-%20Comunidade%20Imers%C3%A3o" style="text-decoration:none"><span class="ico"><i data-lucide="help-circle"></i></span> Suporte <span class="chev"><i data-lucide="chevron-right"></i></span></a>
                        <a class="perfil-op" id="linkAdmin" href="admin.html" style="display:none; text-decoration:none"><span class="ico"><i data-lucide="shield"></i></span> Admin <span class="chev"><i data-lucide="chevron-right"></i></span></a>
                        <button class="perfil-op sair" id="btnSair"><span class="ico"><i data-lucide="log-out"></i></span> Sair <span class="chev"><i data-lucide="chevron-right"></i></span></button>
                    </div>
                    <div class="perfil-aviso" id="perfilAviso"></div>
                </div>

                <div class="perfil-box" id="seusPostsBox" style="margin-top:20px">
                    <div class="perfil-titulo">Seus posts</div>
                    <div class="seus-posts" id="seusPosts"></div>
                </div>
            </section>

            <div class="rodape">Comunidade Imersão · feita com Claude Code por Lara Dam</div>
        </div>
    </div>

    <!-- Fundo 3D: starburst de partículas (mesmo do login) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/starburst.js?v=14"></script>

    <!-- Ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Guard de sessão (Supabase) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/sb.js?v=14"></script>

    <!-- Lógica compartilhada -->
    <script src="js/comunidade.js?v=27"></script>
</body>
</html>
