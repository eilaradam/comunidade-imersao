<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Entrar · Comunidade Imersão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --noite: #05070E;
            --fumo: #0B0F1A;
            --leite: #ECE7DE;
            --claro: #FFFFFF;
            --neblina: rgba(236, 231, 222, .58);
            --fio: rgba(236, 231, 222, .14);
            --vidro: rgba(255, 255, 255, .05);
            --transicao: 200ms cubic-bezier(.2, .7, .3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: #000;
            color: var(--leite);
            min-height: 100vh;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
        }

        button, input { font-family: inherit; }
        button { cursor: pointer; border: none; background: none; color: inherit; }
        :focus-visible { outline: 2px solid rgba(150, 200, 255, .8); outline-offset: 3px; border-radius: 4px; }

        /* ── A cena ── */
        .folha {
            position: relative;
            min-height: calc(100vh - 24px);
            border-radius: 26px;
            overflow: hidden;
            background:
                radial-gradient(120% 90% at 50% 0%, #101827 0%, var(--noite) 55%, #03040A 100%);
            display: flex;
            flex-direction: column;
            padding: 22px clamp(20px, 3.4vw, 48px) 26px;
        }

        .cena { position: absolute; inset: 0; pointer-events: none; }
        .cena canvas { width: 100%; height: 100%; display: block; }

        /* ── O cursor dentro da logo: some a setinha, entra um anel de vidro ── */
        body.na-logo, body.na-logo * { cursor: none; }

        .seguidor {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9;
            width: 0;
            height: 0;
            pointer-events: none;
            will-change: transform;
        }
        .seguidor i {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 44px;
            height: 44px;
            margin: -22px 0 0 -22px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .55);
            background: rgba(255, 255, 255, .07);
            backdrop-filter: blur(3px);
            box-shadow: 0 0 22px rgba(220, 235, 255, .28), inset 0 0 12px rgba(255, 255, 255, .18);
            opacity: 0;
            transform: scale(.4);
            transition: opacity 220ms ease, transform 260ms cubic-bezier(.2, .7, .3, 1);
        }
        .seguidor i::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            margin: -2px 0 0 -2px;
            border-radius: 50%;
            background: #fff;
        }
        .seguidor.aceso i { opacity: 1; transform: scale(1); }

        /* Vinheta pra tipografia sempre ler bem por cima da luz. */
        .folha::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to top, rgba(3, 4, 10, .92) 0%, rgba(3, 4, 10, .35) 38%, transparent 62%),
                linear-gradient(to right, rgba(3, 4, 10, .78) 0%, transparent 45%);
            pointer-events: none;
        }

        .barra, .heroi { position: relative; z-index: 2; }

        /* ── Barra de cima ── */
        .barra {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
        }
        .barra .assinatura { text-align: center; }
        .pilula { justify-self: start; }
        .pilula {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            font-size: 11.5px;
            font-weight: 500;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--leite);
            background: var(--vidro);
            border: 1px solid var(--fio);
            backdrop-filter: blur(12px);
            border-radius: 999px;
            padding: 10px 18px;
        }
        .pilula .traco { display: grid; gap: 3px; }
        .pilula .traco i { display: block; width: 13px; height: 1px; background: var(--leite); }

        .assinatura {
            font-family: 'Fraunces', serif;
            font-size: 17px;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--claro);
        }

        .btn-claro {
            background: var(--leite);
            color: #0A0C14;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: 11px 22px;
            border-radius: 999px;
            transition: transform var(--transicao), background var(--transicao);
        }
        .btn-claro:hover { background: var(--claro); transform: translateY(-1px); }

        /* ── Herói: fica no meio da altura, encostado na esquerda ── */
        .heroi {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 620px;
            padding-bottom: 40px;
        }
        .sobrancelha {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--neblina);
            margin-bottom: 18px;
        }
        .sobrancelha::before { content: '›'; color: var(--claro); font-size: 14px; }

        .heroi h1 {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: clamp(34px, 4.6vw, 62px);
            line-height: 1.06;
            letter-spacing: -.015em;
            color: var(--claro);
            margin-bottom: 26px;
        }
        .heroi h1 em {
            font-style: italic;
            font-weight: 400;
            background: linear-gradient(100deg, #FFFFFF, #DCE8F7 45%, #FFFFFF 75%, #C9D8EC);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ── Formulário ── */
        .forma { max-width: 470px; }
        .etapa { display: none; }
        .etapa.ativa { display: block; animation: sobe 380ms cubic-bezier(.2,.7,.3,1) both; }
        @keyframes sobe { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

        .linha-campo {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--fio);
            backdrop-filter: blur(14px);
            border-radius: 999px;
            padding: 6px 6px 6px 10px;
            transition: border-color var(--transicao), background var(--transicao);
        }
        .linha-campo:focus-within {
            border-color: rgba(180, 220, 255, .55);
            background: rgba(255, 255, 255, .09);
        }
        .linha-campo input {
            flex: 1;
            min-width: 0;
            background: none;
            border: none;
            outline: none;
            color: var(--claro);
            font-size: 15px;
            padding: 12px 14px;
        }
        .linha-campo input::placeholder { color: rgba(236, 231, 222, .42); }
        .linha-campo .btn-claro { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .linha-campo .btn-claro .seta {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: rgba(10, 12, 20, .12);
            display: grid; place-items: center;
            font-size: 11px;
        }
        .par { display: flex; flex-direction: column; gap: 10px; }

        .etapa h2 {
            font-family: 'Fraunces', serif;
            font-weight: 400;
            font-size: 24px;
            color: var(--claro);
            margin-bottom: 4px;
        }
        .etapa .dizeres { font-size: 14px; color: var(--neblina); margin-bottom: 16px; }
        .quem-e {
            display: inline-block;
            font-size: 12px;
            letter-spacing: .04em;
            color: var(--neblina);
            border: 1px solid var(--fio);
            border-radius: 999px;
            padding: 6px 14px;
            margin-bottom: 14px;
            word-break: break-all;
        }
        .abaixo { display: flex; gap: 18px; margin-top: 14px; }
        .abaixo button {
            font-size: 12px;
            letter-spacing: .06em;
            color: var(--neblina);
            border-bottom: 1px solid transparent;
        }
        .abaixo button:hover { color: var(--claro); border-bottom-color: var(--fio); }

        .recado {
            font-size: 13.5px;
            margin-top: 14px;
            padding: 11px 15px;
            border-radius: 12px;
            display: none;
        }
        .recado.show { display: block; }
        .recado.erro { background: rgba(255, 120, 100, .1); border: 1px solid rgba(255, 140, 120, .3); color: #FFC4B8; }
        .recado.ok { background: rgba(110, 230, 190, .1); border: 1px solid rgba(110, 230, 190, .3); color: #A7EFD6; }

        @media (max-width: 980px) {
            body { padding: 8px; }
            .folha { border-radius: 20px; padding: 16px 18px 24px; min-height: calc(100vh - 16px); }
            .assinatura { display: none; }
            .heroi { max-width: none; justify-content: flex-end; padding-bottom: 10px; }
            .heroi h1 { font-size: clamp(30px, 8.4vw, 44px); }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="folha">
        <div class="cena" id="palcoCerebro"><canvas id="cerebro"></canvas></div>

        <nav class="barra">
            <span class="pilula"><span class="traco"><i></i><i></i></span> Comunidade</span>
            <span class="assinatura">Imersão</span>
            <span class="canto-vazio"></span>
        </nav>

        <main class="heroi">
            <p class="sobrancelha">Comunidade da Imersão Portfólio</p>
            <h1>Construa junto,<br>vá mais <em>longe</em></h1>

            <div class="forma">
                <!-- Etapa 1: e-mail -->
                <div class="etapa ativa" id="etapaEmail">
                    <form id="formEmail" novalidate>
                        <div class="linha-campo">
                            <input type="email" id="email" autocomplete="email" placeholder="Seu e-mail da compra" required>
                            <button type="submit" class="btn-claro" id="btnEmail">Entrar <span class="seta">→</span></button>
                        </div>
                    </form>
                    <div class="recado erro" id="recadoEmail"></div>
                </div>

                <!-- Etapa 2: senha -->
                <div class="etapa" id="etapaSenha">
                    <h2 id="oiVolta">Que bom te ver de novo</h2>
                    <p class="dizeres">Digite sua senha pra entrar.</p>
                    <p class="quem-e" id="ecoSenha"></p>
                    <form id="formSenha" novalidate>
                        <div class="linha-campo">
                            <input type="password" id="senha" autocomplete="current-password" placeholder="Sua senha" required>
                            <button type="submit" class="btn-claro" id="btnSenha">Entrar <span class="seta">→</span></button>
                        </div>
                    </form>
                    <div class="recado erro" id="recadoSenha"></div>
                    <div class="abaixo">
                        <button id="linkEsqueci">Esqueci minha senha</button>
                        <button data-voltar>Usar outro e-mail</button>
                    </div>
                </div>

                <!-- Etapa 3: criar senha -->
                <div class="etapa" id="etapaCriar">
                    <h2 id="oiNova">Boas-vindas</h2>
                    <p class="dizeres">Primeiro acesso. Crie uma senha de pelo menos 6 caracteres.</p>
                    <p class="quem-e" id="ecoCriar"></p>
                    <form id="formCriar" novalidate>
                        <div class="par">
                            <div class="linha-campo">
                                <input type="password" id="senhaNova" autocomplete="new-password" placeholder="Crie sua senha" required>
                            </div>
                            <div class="linha-campo">
                                <input type="password" id="senhaConf" autocomplete="new-password" placeholder="Repita a senha" required>
                                <button type="submit" class="btn-claro" id="btnCriar">Criar <span class="seta">→</span></button>
                            </div>
                        </div>
                    </form>
                    <div class="recado erro" id="recadoCriar"></div>
                    <div class="abaixo">
                        <button data-voltar>Usar outro e-mail</button>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <div class="seguidor" id="seguidor" aria-hidden="true"><i></i></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/sb.js"></script>
    <script src="js/cerebro.js"></script>
    <script>
    (function () {
        'use strict';
        const { sb } = window.C;

        const etapas = {
            email: document.getElementById('etapaEmail'),
            senha: document.getElementById('etapaSenha'),
            criar: document.getElementById('etapaCriar')
        };
        let emailAtual = '';

        function mostrar(nome) {
            Object.values(etapas).forEach(e => e.classList.remove('ativa'));
            etapas[nome].classList.add('ativa');
        }

        function recado(id, texto, tipo) {
            const el = document.getElementById(id);
            el.textContent = texto;
            el.className = 'recado ' + (tipo || 'erro') + (texto ? ' show' : '');
        }

        function carregando(btn, ligado, original) {
            btn.disabled = ligado;
            btn.innerHTML = ligado ? 'Um instante...' : original;
        }

        /* Já logada? vai direto pra comunidade. */
        (async function () {
            const { data: { session } } = await sb.auth.getSession();
            if (session) window.location.replace('app.html');
        })();

        /* Etapa 1: o e-mail está na lista da turma? */
        document.getElementById('formEmail').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const btn = document.getElementById('btnEmail');
            const original = btn.innerHTML;
            const email = document.getElementById('email').value.trim().toLowerCase();
            if (!email || !email.includes('@')) return recado('recadoEmail', 'Digite um e-mail válido.');

            recado('recadoEmail', '');
            carregando(btn, true, original);
            try {
                const { data, error } = await sb.functions.invoke('imersao-conta', {
                    body: { action: 'status', email }
                });
                if (error) throw error;

                if (!data.na_lista) {
                    recado('recadoEmail', data.mensagem || 'Esse e-mail não está na lista da turma.');
                    return;
                }

                emailAtual = email;
                const primeiroNome = (data.nome || '').split(' ')[0];

                if (data.tem_conta) {
                    document.getElementById('ecoSenha').textContent = email;
                    if (primeiroNome) document.getElementById('oiVolta').textContent = `Oi de novo, ${primeiroNome}`;
                    mostrar('senha');
                    document.getElementById('senha').focus();
                } else {
                    document.getElementById('ecoCriar').textContent = email;
                    if (primeiroNome) document.getElementById('oiNova').textContent = `Boas-vindas, ${primeiroNome}`;
                    mostrar('criar');
                    document.getElementById('senhaNova').focus();
                }
            } catch (e) {
                recado('recadoEmail', 'Não consegui verificar agora. Tente de novo em instantes.');
            } finally {
                carregando(btn, false, original);
            }
        });

        /* Etapa 2: entrar com senha. */
        document.getElementById('formSenha').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const btn = document.getElementById('btnSenha');
            const original = btn.innerHTML;
            const senha = document.getElementById('senha').value;
            recado('recadoSenha', '');
            carregando(btn, true, original);
            const { error } = await sb.auth.signInWithPassword({ email: emailAtual, password: senha });
            carregando(btn, false, original);
            if (error) {
                recado('recadoSenha', error.message === 'Invalid login credentials'
                    ? 'Senha incorreta. Tente de novo ou peça uma senha nova.'
                    : 'Não consegui entrar agora. Tente de novo.');
                return;
            }
            window.location.href = 'app.html';
        });

        /* Etapa 3: criar a conta (a função no servidor confere a lista de novo). */
        document.getElementById('formCriar').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const btn = document.getElementById('btnCriar');
            const original = btn.innerHTML;
            const senha = document.getElementById('senhaNova').value;
            const conf = document.getElementById('senhaConf').value;

            if (senha.length < 6) return recado('recadoCriar', 'A senha precisa ter pelo menos 6 caracteres.');
            if (senha !== conf) return recado('recadoCriar', 'As duas senhas não são iguais.');

            recado('recadoCriar', '');
            carregando(btn, true, original);
            try {
                const { data, error } = await sb.functions.invoke('imersao-conta', {
                    body: { action: 'criar', email: emailAtual, senha }
                });
                if (error || data?.error) throw new Error(data?.error || 'erro');

                const { error: erroLogin } = await sb.auth.signInWithPassword({ email: emailAtual, password: senha });
                if (erroLogin) throw erroLogin;

                window.location.href = 'app.html';
            } catch (e) {
                recado('recadoCriar', 'Não consegui criar seu acesso agora. Tente de novo em instantes.');
                carregando(btn, false, original);
            }
        });

        /* Esqueci a senha. */
        document.getElementById('linkEsqueci').addEventListener('click', async (ev) => {
            ev.preventDefault();
            if (!emailAtual) return;
            recado('recadoSenha', '');
            const { error } = await sb.auth.resetPasswordForEmail(emailAtual, {
                redirectTo: window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'nova-senha.html'
            });
            recado('recadoSenha', error
                ? 'Não consegui enviar o e-mail agora. Tente de novo em instantes.'
                : 'Pronto. Te mandei um link por e-mail pra criar uma senha nova (confira a aba promoções).',
                error ? 'erro' : 'ok');
        });

        document.querySelectorAll('[data-voltar]').forEach(b => b.addEventListener('click', () => {
            emailAtual = '';
            ['recadoEmail', 'recadoSenha', 'recadoCriar'].forEach(r => recado(r, ''));
            document.getElementById('formSenha').reset();
            document.getElementById('formCriar').reset();
            mostrar('email');
            document.getElementById('email').focus();
        }));

        /* Os atalhos de cima só levam pro campo de e-mail. */
        document.querySelectorAll('[data-ir]').forEach(a => a.addEventListener('click', (ev) => {
            ev.preventDefault();
            document.getElementById('email').focus();
        }));
    })();
    </script>
</body>
</html>
