<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Entrar · Comunidade Imersão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=6">
    <style>
        body {
            min-height: 100vh;
            padding: 14px;
            display: flex;
            background: var(--areia-escura);
        }

        /* ── A folha de vidro que segura a cena ── */
        .folha {
            position: relative;
            flex: 1;
            min-height: calc(100vh - 28px);
            border-radius: 32px;
            overflow: hidden;
            background:
                radial-gradient(120% 90% at 72% 8%, #FDFCFA 0%, var(--areia-clara) 46%, var(--areia) 100%);
            display: flex;
            flex-direction: column;
            padding: 24px clamp(20px, 3.6vw, 52px) 30px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .8), var(--sombra-alta);
        }

        .cena { position: absolute; inset: 0; pointer-events: none; }
        .cena canvas { width: 100%; height: 100%; display: block; }

        /* Um véu de luz do lado do texto, pra tipografia nunca disputar com a rede. */
        .folha::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(100deg, rgba(247, 242, 236, .82) 0%, rgba(247, 242, 236, .38) 26%, transparent 48%);
            pointer-events: none;
        }

        .barra, .heroi { position: relative; z-index: 2; }

        /* Dentro da logo o cursor avisa que dá pra pegar e puxar. */
        body.na-logo { cursor: grab; }
        body.puxando, body.puxando * { cursor: grabbing; }

        /* ── Barra de cima ── */
        .barra {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
        }
        .pilula {
            justify-self: start;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--tinta-media);
            background: var(--vidro-forte);
            border: 1px solid var(--fio);
            backdrop-filter: var(--desfoque);
            -webkit-backdrop-filter: var(--desfoque);
            border-radius: 999px;
            padding: 11px 20px;
            box-shadow: var(--sombra);
        }
        .pilula .traco { display: grid; gap: 3px; }
        .pilula .traco i { display: block; width: 13px; height: 1px; background: var(--tinta-media); }

        .assinatura {
            text-align: center;
            font-family: 'Fraunces', serif;
            font-size: 16px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--tinta);
            white-space: nowrap;
        }

        /* ── Herói: no meio da altura, encostado na esquerda ── */
        .heroi {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 640px;
            padding-bottom: 40px;
        }
        .sobrancelha {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--terracota);
            margin-bottom: 20px;
        }
        .sobrancelha::before { content: '›'; font-size: 14px; }

        .heroi h1 {
            font-weight: 300;
            font-size: clamp(36px, 4.8vw, 64px);
            line-height: 1.05;
            letter-spacing: -.02em;
            margin-bottom: 28px;
        }
        .heroi h1 em {
            font-style: italic;
            font-weight: 400;
            background: linear-gradient(100deg, var(--terracota), var(--champanhe) 55%, var(--pessego));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ── Formulário: um painel de vidro fosco, compacto, que flutua sobre a cena ── */
        .forma {
            max-width: 400px;
            background: rgba(255, 255, 255, .28);
            border: 1px solid rgba(255, 255, 255, .7);
            backdrop-filter: blur(40px) saturate(140%);
            -webkit-backdrop-filter: blur(40px) saturate(140%);
            border-radius: 26px;
            padding: 22px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .7), var(--sombra-alta);
        }
        .etapa { display: none; }
        .etapa.ativa { display: block; animation: sobe 380ms cubic-bezier(.2,.7,.3,1) both; }
        @keyframes sobe { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

        .linha-campo {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, .78);
            border: 1px solid var(--fio);
            border-radius: 999px;
            padding: 7px 7px 7px 12px;
            box-shadow: inset 0 1px 3px rgba(58, 50, 42, .05);
            transition: border-color var(--transicao), box-shadow var(--transicao);
        }
        .linha-campo:focus-within {
            border-color: var(--champanhe);
            box-shadow: inset 0 1px 3px rgba(58, 50, 42, .05), 0 0 0 4px rgba(217, 185, 138, .22);
        }
        .linha-campo input {
            flex: 1;
            min-width: 0;
            background: none;
            border: none;
            outline: none;
            box-shadow: none;
            padding: 12px 14px;
        }
        .linha-campo input:focus { background: none; box-shadow: none; }
        .linha-campo .btn { flex-shrink: 0; }
        .linha-campo .btn .seta {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .55);
            display: grid; place-items: center;
            font-size: 11px;
        }
        .par { display: flex; flex-direction: column; gap: 10px; }

        .etapa h2 {
            font-weight: 400;
            font-size: 25px;
            margin-bottom: 5px;
        }
        .etapa .dizeres { font-size: 14px; color: var(--tinta-media); margin-bottom: 16px; max-width: 44ch; }
        .quem-e {
            display: inline-block;
            font-size: 12.5px;
            color: var(--tinta-media);
            background: var(--vidro-fraco);
            border: 1px solid var(--fio);
            border-radius: 999px;
            padding: 7px 15px;
            margin-bottom: 15px;
            word-break: break-all;
        }
        .abaixo { display: flex; gap: 18px; margin-top: 16px; }
        .abaixo button {
            font-size: 12.5px;
            color: var(--tinta-media);
            border-bottom: 1px solid transparent;
        }
        .abaixo button:hover { color: var(--terracota); border-bottom-color: var(--champanhe); }

        @media (max-width: 980px) {
            body { padding: 8px; }
            .folha { border-radius: 24px; padding: 18px 20px 26px; min-height: calc(100vh - 16px); }
            .assinatura { display: none; }
            .folha::after {
                background: linear-gradient(to top, rgba(247, 242, 236, .96) 30%, rgba(247, 242, 236, .5) 55%, transparent 78%);
            }
            .heroi { max-width: none; justify-content: flex-end; padding-bottom: 12px; }
            .heroi h1 { font-size: clamp(32px, 8.6vw, 46px); }
        }
    </style>
</head>
<body>
    <div class="folha">
        <div class="cena" id="palcoCerebro"><canvas id="cerebro"></canvas></div>

        <nav class="barra">
            <span class="canto-vazio"></span>
            <span class="assinatura">Comunidade Imersão com o Claude</span>
            <span class="canto-vazio"></span>
        </nav>

        <main class="heroi">
            <p class="sobrancelha">Comunidade da Imersão Portfólio</p>
            <h1>Construa junto,<br>vá mais <em>longe</em></h1>

            <div class="forma">
                <!-- Etapa 1: e-mail -->
                <div class="etapa ativa" id="etapaEmail">
                    <form id="formEmail" novalidate>
                        <div class="linha-campo">
                            <input type="email" id="email" autocomplete="email" placeholder="Seu e-mail da compra" required>
                            <button type="submit" class="btn" id="btnEmail">Entrar <span class="seta">→</span></button>
                        </div>
                    </form>
                    <div class="recado erro" id="recadoEmail"></div>
                </div>

                <!-- Etapa 2: senha -->
                <div class="etapa" id="etapaSenha">
                    <h2 id="oiVolta">Que bom te ver de novo</h2>
                    <p class="dizeres" id="dizeresSenha">Digite sua senha pra entrar.</p>
                    <p class="quem-e" id="ecoSenha"></p>
                    <form id="formSenha" novalidate>
                        <div class="linha-campo">
                            <input type="password" id="senha" autocomplete="current-password" placeholder="Sua senha" required>
                            <button type="submit" class="btn" id="btnSenha">Entrar <span class="seta">→</span></button>
                        </div>
                    </form>
                    <div class="recado erro" id="recadoSenha"></div>
                    <div class="abaixo">
                        <button id="linkEsqueci">Criar uma senha nova</button>
                        <button data-voltar>Usar outro e-mail</button>
                    </div>
                </div>

                <!-- Etapa 3: criar senha -->
                <div class="etapa" id="etapaCriar">
                    <h2 id="oiNova">Boas-vindas</h2>
                    <p class="dizeres">Primeiro acesso. Crie uma senha de pelo menos 6 caracteres.</p>
                    <p class="quem-e" id="ecoCriar"></p>
                    <form id="formCriar" novalidate>
                        <div class="par">
                            <div class="linha-campo">
                                <input type="password" id="senhaNova" autocomplete="new-password" placeholder="Crie sua senha" required>
                            </div>
                            <div class="linha-campo">
                                <input type="password" id="senhaConf" autocomplete="new-password" placeholder="Repita a senha" required>
                                <button type="submit" class="btn" id="btnCriar">Criar <span class="seta">→</span></button>
                            </div>
                        </div>
                    </form>
                    <div class="recado erro" id="recadoCriar"></div>
                    <div class="abaixo">
                        <button data-voltar>Usar outro e-mail</button>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/sb.js?v=6"></script>
    <script src="js/cerebro.js?v=6"></script>
    <script>
    (function () {
        'use strict';
        const { sb } = window.C;

        const etapas = {
            email: document.getElementById('etapaEmail'),
            senha: document.getElementById('etapaSenha'),
            criar: document.getElementById('etapaCriar')
        };
        let emailAtual = '';

        function mostrar(nome) {
            Object.values(etapas).forEach(e => e.classList.remove('ativa'));
            etapas[nome].classList.add('ativa');
        }

        function recado(id, texto, tipo) {
            const el = document.getElementById(id);
            el.textContent = texto;
            el.className = 'recado ' + (tipo || 'erro') + (texto ? ' show' : '');
        }

        function carregando(btn, ligado, original) {
            btn.disabled = ligado;
            btn.innerHTML = ligado ? 'Um instante...' : original;
        }

        /* Já logada? vai direto pra comunidade. */
        (async function () {
            const { data: { session } } = await sb.auth.getSession();
            if (session) window.location.replace('app.html');
        })();

        /* Etapa 1: o e-mail está na lista da turma? */
        document.getElementById('formEmail').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const btn = document.getElementById('btnEmail');
            const original = btn.innerHTML;
            const email = document.getElementById('email').value.trim().toLowerCase();
            if (!email || !email.includes('@')) return recado('recadoEmail', 'Digite um e-mail válido.');

            recado('recadoEmail', '');
            carregando(btn, true, original);
            try {
                const { data, error } = await sb.functions.invoke('imersao-conta', {
                    body: { action: 'status', email }
                });
                if (error) throw error;

                if (!data.na_lista) {
                    recado('recadoEmail', data.mensagem || 'Esse e-mail não está na lista da turma.');
                    return;
                }

                emailAtual = email;
                const primeiroNome = (data.nome || '').split(' ')[0];

                if (data.tem_conta) {
                    document.getElementById('ecoSenha').textContent = email;
                    if (primeiroNome) document.getElementById('oiVolta').textContent = `Oi de novo, ${primeiroNome}`;

                    /* Conta que já existia no site da Lara mas nunca entrou aqui: a senha dela
                       é a do painel antigo, que quase ninguém lembra. Melhor avisar de cara. */
                    document.getElementById('dizeresSenha').textContent = data.conta_antiga
                        ? 'Esse e-mail já tinha uma conta no site da Lara. Se você não lembra a senha, clique em "criar uma senha nova" aqui embaixo e eu te mando um link por e-mail.'
                        : 'Digite sua senha pra entrar.';

                    mostrar('senha');
                    document.getElementById('senha').focus();
                } else {
                    document.getElementById('ecoCriar').textContent = email;
                    if (primeiroNome) document.getElementById('oiNova').textContent = `Boas-vindas, ${primeiroNome}`;
                    mostrar('criar');
                    document.getElementById('senhaNova').focus();
                }
            } catch (e) {
                recado('recadoEmail', 'Não consegui verificar agora. Tente de novo em instantes.');
            } finally {
                carregando(btn, false, original);
            }
        });

        /* Etapa 2: entrar com senha. */
        document.getElementById('formSenha').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const btn = document.getElementById('btnSenha');
            const original = btn.innerHTML;
            const senha = document.getElementById('senha').value;
            recado('recadoSenha', '');
            carregando(btn, true, original);
            const { error } = await sb.auth.signInWithPassword({ email: emailAtual, password: senha });
            carregando(btn, false, original);
            if (error) {
                recado('recadoSenha', error.message === 'Invalid login credentials'
                    ? 'Senha incorreta. Tente de novo ou peça uma senha nova.'
                    : 'Não consegui entrar agora. Tente de novo.');
                return;
            }
            window.location.href = 'app.html';
        });

        /* Etapa 3: criar a conta (a função no servidor confere a lista de novo). */
        document.getElementById('formCriar').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const btn = document.getElementById('btnCriar');
            const original = btn.innerHTML;
            const senha = document.getElementById('senhaNova').value;
            const conf = document.getElementById('senhaConf').value;

            if (senha.length < 6) return recado('recadoCriar', 'A senha precisa ter pelo menos 6 caracteres.');
            if (senha !== conf) return recado('recadoCriar', 'As duas senhas não são iguais.');

            recado('recadoCriar', '');
            carregando(btn, true, original);
            try {
                const { data, error } = await sb.functions.invoke('imersao-conta', {
                    body: { action: 'criar', email: emailAtual, senha }
                });
                if (error || data?.error) throw new Error(data?.error || 'erro');

                const { error: erroLogin } = await sb.auth.signInWithPassword({ email: emailAtual, password: senha });
                if (erroLogin) throw erroLogin;

                window.location.href = 'app.html';
            } catch (e) {
                recado('recadoCriar', 'Não consegui criar seu acesso agora. Tente de novo em instantes.');
                carregando(btn, false, original);
            }
        });

        /* Esqueci a senha. */
        document.getElementById('linkEsqueci').addEventListener('click', async (ev) => {
            ev.preventDefault();
            if (!emailAtual) return;
            recado('recadoSenha', '');
            const { error } = await sb.auth.resetPasswordForEmail(emailAtual, {
                redirectTo: window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'nova-senha.html'
            });
            recado('recadoSenha', error
                ? 'Não consegui enviar o e-mail agora. Tente de novo em instantes.'
                : 'Pronto. Te mandei um link por e-mail pra criar uma senha nova (confira a aba promoções).',
                error ? 'erro' : 'ok');
        });

        document.querySelectorAll('[data-voltar]').forEach(b => b.addEventListener('click', () => {
            emailAtual = '';
            ['recadoEmail', 'recadoSenha', 'recadoCriar'].forEach(r => recado(r, ''));
            document.getElementById('formSenha').reset();
            document.getElementById('formCriar').reset();
            mostrar('email');
            document.getElementById('email').focus();
        }));

        /* Os atalhos de cima só levam pro campo de e-mail. */
        document.querySelectorAll('[data-ir]').forEach(a => a.addEventListener('click', (ev) => {
            ev.preventDefault();
            document.getElementById('email').focus();
        }));
    })();
    </script>
</body>
</html>
