<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Entrar · Comunidade Imersão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        background: #FAFAFC;
        color: #1D1D1F;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
    }

    /* ── CAMADA A: blobs de cor suave, bem desfocados, o mais atrás ── */
    .blobs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(120px); will-change: transform; }
    .b1 { width: 620px; height: 620px; background: #B8C6E8; opacity: .6; left: 50%; top: 46%; margin: -310px 0 0 -430px; animation: fl1 24s ease-in-out infinite; }
    .b2 { width: 560px; height: 560px; background: #E8C4B8; opacity: .55; left: 50%; top: 50%; margin: -280px 0 0 -110px; animation: fl2 29s ease-in-out infinite; }
    .b3 { width: 700px; height: 700px; background: #C8B8E0; opacity: .5; left: 50%; top: 55%; margin: -350px 0 0 -360px; animation: fl3 22s ease-in-out infinite; }
    .b4 { width: 470px; height: 470px; background: #B8E0D0; opacity: .55; left: 50%; top: 42%; margin: -235px 0 0 -40px; animation: fl4 26s ease-in-out infinite; }
    @keyframes fl1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-42px,32px); } }
    @keyframes fl2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(36px,-40px); } }
    @keyframes fl3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px,42px); } }
    @keyframes fl4 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px,-34px); } }

    /* ── CAMADA B: starburst de partículas ── */
    #cena { position: fixed; inset: 0; z-index: 1; }
    #cena canvas { display: block; }

    /* ── Card de login (glassmorphism visionOS) ── */
    .card {
        position: relative;
        z-index: 2;
        width: 400px;
        max-width: 90vw;
        padding: 48px 40px;
        background: rgba(255, 255, 255, 0.0);
        -webkit-backdrop-filter: blur(5px) saturate(1.5);
        backdrop-filter: blur(5px) saturate(1.5);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }
    .card::before {
        content: '';
        position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9), transparent);
    }

    .headline { font-size: 32px; line-height: 1.15; font-weight: 600; letter-spacing: -0.02em; color: #1D1D1F; }
    .sub2 { font-size: 14px; font-weight: 400; color: rgba(0, 0, 0, 0.55); margin-top: 24px; margin-bottom: 32px; }

    .campo { margin-bottom: 18px; }
    .campo label {
        display: block;
        font-size: 13px;
        color: rgba(0, 0, 0, 0.5);
        letter-spacing: 0.02em;
        margin-bottom: 8px;
    }
    .campo input {
        width: 100%;
        font-family: inherit;
        font-size: 16px;
        color: #1D1D1F;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
        background: rgba(255, 255, 255, 0.25);
        -webkit-backdrop-filter: blur(15px);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        padding: 14px 18px;
        outline: none;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.04);
        transition: border-color 250ms ease, box-shadow 250ms ease, background 250ms ease;
    }
    .campo input::placeholder { color: rgba(0, 0, 0, 0.3); }
    .campo input:focus {
        border-color: rgba(255, 255, 255, 0.95);
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.35), inset 0 1px 2px rgba(0, 0, 0, 0.04);
        background: rgba(255, 255, 255, 0.6);
    }
    input:-webkit-autofill,
    input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0 40px rgba(255, 255, 255, 0.9) inset;
        -webkit-text-fill-color: #1D1D1F;
        transition: background-color 5000s;
    }

    .entrar {
        position: relative;
        overflow: hidden;
        width: 100%;
        font-family: inherit;
        font-size: 16px;
        font-weight: 600;
        color: #FFFFFF;
        background: #1D1D1F;
        border: none;
        border-radius: 999px;
        padding: 16px;
        margin-top: 6px;
        cursor: pointer;
        transition: background 200ms ease, transform 120ms ease, box-shadow 200ms ease;
    }
    .entrar::after {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 50%);
        pointer-events: none;
    }
    .entrar:hover { background: #000000; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25); }
    .entrar:active { transform: scale(0.98); }
    .entrar:disabled { opacity: .6; cursor: default; }

    /* Campo único de e-mail/senha com botão integrado (pill) */
    .pill {
        display: flex; align-items: center; gap: 6px;
        background: rgba(255, 255, 255, 0.25);
        -webkit-backdrop-filter: blur(15px); backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 999px;
        padding: 6px 6px 6px 18px;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.04);
        transition: border-color 250ms ease, box-shadow 250ms ease, background 250ms ease;
    }
    .pill:focus-within {
        border-color: rgba(255, 255, 255, 0.95);
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.35), inset 0 1px 2px rgba(0, 0, 0, 0.04);
        background: rgba(255, 255, 255, 0.4);
    }
    .pill input {
        flex: 1; min-width: 0; border: none; background: none; outline: none;
        font-family: inherit; font-size: 16px; color: #1D1D1F;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4); padding: 12px 0;
    }
    .pill input::placeholder { color: rgba(0, 0, 0, 0.3); }
    .btn-pill {
        flex-shrink: 0; display: inline-flex; align-items: center; gap: 8px;
        font-family: inherit; font-size: 15px; font-weight: 600;
        color: #FFFFFF; background: #1D1D1F; border: none; border-radius: 999px;
        padding: 12px 20px; cursor: pointer;
        transition: background 200ms ease, transform 120ms ease;
    }
    .btn-pill:hover { background: #000000; }
    .btn-pill:active { transform: scale(0.97); }
    .btn-pill:disabled { opacity: .6; cursor: default; }
    .btn-pill .seta {
        display: inline-grid; place-items: center; width: 18px; height: 18px;
        border-radius: 50%; background: rgba(255, 255, 255, 0.2); font-size: 12px;
    }
    .par { display: flex; flex-direction: column; gap: 10px; }
    .par .campo { margin-bottom: 0; }

    /* ── Etapas do login ── */
    .etapa { display: none; }
    .etapa.ativa { display: block; animation: sobe 380ms cubic-bezier(.2,.7,.3,1) both; }
    @keyframes sobe { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .etapa h2 { font-size: 20px; font-weight: 600; color: #1D1D1F; margin-bottom: 4px; }
    .etapa .dizeres { font-size: 14px; color: rgba(0, 0, 0, 0.5); margin-bottom: 16px; }
    .quem-e {
        display: inline-block; font-size: 13px; color: rgba(0, 0, 0, 0.55);
        background: rgba(255, 255, 255, 0.35); border: 1px solid rgba(255, 255, 255, 0.6);
        -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
        border-radius: 999px; padding: 6px 14px; margin-bottom: 16px; word-break: break-all;
    }

    .recado {
        font-size: 13.5px; padding: 11px 14px; border-radius: 12px; margin-top: 14px; display: none;
        color: #1D1D1F; background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.7);
        -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    }
    .recado.show { display: block; }

    .abaixo { display: flex; gap: 18px; margin-top: 18px; justify-content: center; flex-wrap: wrap; }
    .abaixo button {
        font-family: inherit; background: none; border: none; cursor: pointer;
        font-size: 13px; color: rgba(0, 0, 0, 0.5);
    }
    .abaixo button:hover { color: #1D1D1F; text-decoration: underline; }

    @media (max-width: 520px) {
        .card { padding: 32px 24px; }
        .headline { font-size: 26px; }
    }
</style>
</head>
<body>
    <div class="blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
        <div class="blob b4"></div>
    </div>
    <div id="cena"></div>

    <main class="card">
        <h1 class="headline">Construa junto,<br>vá mais longe.</h1>
        <p class="sub2">Sua área da Imersão com o Claude</p>

        <div class="forma">
            <!-- Etapa 1: e-mail -->
            <div class="etapa ativa" id="etapaEmail">
                <form id="formEmail" novalidate>
                    <div class="pill">
                        <input type="email" id="email" placeholder="Seu e-mail da compra" autocomplete="email" required>
                        <button type="submit" class="btn-pill" id="btnEmail">Entrar <span class="seta">→</span></button>
                    </div>
                </form>
                <div class="recado" id="recadoEmail"></div>
            </div>

            <!-- Etapa 2: link mágico enviado -->
            <div class="etapa" id="etapaEnviado">
                <h2>Confira seu e-mail 📩</h2>
                <p class="dizeres">Te enviei um <b>link mágico</b> pra entrar — é só abrir seu e-mail e clicar no botão. Sem senha! (dá uma olhada também na aba <b>Promoções</b>/spam.)</p>
                <p class="quem-e" id="ecoEnviado"></p>
                <div class="recado" id="recadoEnviado"></div>
                <div class="abaixo">
                    <button type="button" id="reenviar">Reenviar o link</button>
                    <button type="button" data-voltar>Usar outro e-mail</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Fundo 3D: starburst de partículas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/starburst.js?v=14"></script>

    <!-- Login real (Supabase) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/sb.js?v=14"></script>
    <script>
    (function () {
        'use strict';
        const { sb } = window.C;

        const etapas = {
            email: document.getElementById('etapaEmail'),
            enviado: document.getElementById('etapaEnviado')
        };
        let emailAtual = '';

        /* Pra onde o link mágico leva ela depois de clicar no e-mail. */
        const REDIRECT = window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'app.html';

        function mostrar(nome) {
            Object.values(etapas).forEach(e => e.classList.remove('ativa'));
            etapas[nome].classList.add('ativa');
        }

        function recado(id, texto, tipo) {
            const el = document.getElementById(id);
            el.textContent = texto;
            el.className = 'recado ' + (tipo || 'erro') + (texto ? ' show' : '');
        }

        function carregando(btn, ligado, original) {
            btn.disabled = ligado;
            btn.innerHTML = ligado ? 'Um instante...' : original;
        }

        /* Já logada? vai direto pra comunidade. */
        (async function () {
            const { data: { session } } = await sb.auth.getSession();
            if (session) window.location.replace('app.html');
        })();

        /* Confere se o e-mail comprou (o servidor decide) e, se sim, manda o
           link mágico. A conta e o perfil são preparados no servidor antes. */
        async function enviarLink(email, btn, original, recadoId) {
            recado(recadoId, '');
            if (btn) carregando(btn, true, original);
            try {
                // 1) porteira: está na lista? + prepara conta/perfil (roda no servidor)
                const { data, error } = await sb.functions.invoke('imersao-conta', {
                    body: { action: 'preparar', email }
                });
                if (error) throw error;
                if (!data || !data.na_lista) {
                    recado('recadoEmail', (data && data.mensagem) || 'Esse e-mail não está na lista da turma. Use o mesmo e-mail da compra ou fale com a Lara.');
                    return false;
                }
                // 2) envia o link mágico pro e-mail dela
                const { error: erroOtp } = await sb.auth.signInWithOtp({
                    email,
                    options: { emailRedirectTo: REDIRECT, shouldCreateUser: false }
                });
                if (erroOtp) throw erroOtp;
                return true;
            } catch (e) {
                recado(recadoId, 'Não consegui enviar o link agora. Tente de novo em instantes.');
                return false;
            } finally {
                if (btn) carregando(btn, false, original);
            }
        }

        /* Etapa 1: e-mail → manda o link mágico. */
        document.getElementById('formEmail').addEventListener('submit', async (ev) => {
            ev.preventDefault();
            const btn = document.getElementById('btnEmail');
            const original = btn.innerHTML;
            const email = document.getElementById('email').value.trim().toLowerCase();
            if (!email || !email.includes('@')) return recado('recadoEmail', 'Digite um e-mail válido.');

            const ok = await enviarLink(email, btn, original, 'recadoEmail');
            if (ok) {
                emailAtual = email;
                document.getElementById('ecoEnviado').textContent = email;
                mostrar('enviado');
            }
        });

        /* Reenviar o link. */
        document.getElementById('reenviar').addEventListener('click', async () => {
            if (!emailAtual) return;
            const ok = await enviarLink(emailAtual, null, '', 'recadoEnviado');
            if (ok) recado('recadoEnviado', 'Link reenviado! Confira seu e-mail.', 'ok');
        });

        document.querySelectorAll('[data-voltar]').forEach(b => b.addEventListener('click', () => {
            emailAtual = '';
            ['recadoEmail', 'recadoEnviado'].forEach(r => recado(r, ''));
            document.getElementById('formEmail').reset();
            mostrar('email');
            document.getElementById('email').focus();
        }));
    })();
    </script>
</body>
</html>
